<!DOCTYPE html>
<html>

<head>
  <title>CSS 
    Positioning Exercise</title>
  <style>
    .red-circle {background-color: red;
      width: 200px;
      height: 200px;
      border-radius: 50%; 
      position: absolute;
      left: 50%;
      bottom: -25%;
      

    
    
    }

    
      
    .blue-box {background-color: blue;
      position: relative;
      width: 500px;
      height: 300px;
      left:25%;
      margin-top: 200px;
      
  

    
    }

  </style>
</head>

<body>
  <div class="blue-box">
    <div class="red-circle">
    </div>
  </div>

</body>

</html>
